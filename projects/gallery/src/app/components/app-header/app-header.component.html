<mat-toolbar class="header">
  <a class="brand" routerLink="/">
    <span class="brand__mark" aria-hidden="true"></span>
    <span class="brand__title">Material Theme</span>
  </a>

  <nav class="nav" aria-label="Sections">
    @for (link of links; track link.path) {
      <a
        mat-button
        class="nav__link"
        [routerLink]="link.path"
        routerLinkActive="nav__link--active"
        [routerLinkActiveOptions]="{ exact: link.path === '/' }"
      >
        {{ link.label }}
      </a>
    }
  </nav>

  <span class="header__spacer"></span>

  <button
    mat-icon-button
    aria-label="Open mobile menu"
    class="header__mobile-toggle"
    [matMenuTriggerFor]="mobileMenu"
  >
    <mat-icon class="material-symbols-rounded">menu</mat-icon>
  </button>

  <button
    mat-icon-button
    aria-label="Open profile menu"
    [matMenuTriggerFor]="profileMenu"
  >
    <mat-icon class="material-symbols-rounded">account_circle</mat-icon>
  </button>
</mat-toolbar>

<mat-menu #mobileMenu="matMenu" xPosition="before">
  @for (link of links; track link.path) {
    <a mat-menu-item [routerLink]="link.path">{{ link.label }}</a>
  }
</mat-menu>

<mat-menu #profileMenu="matMenu" xPosition="before">
  <div class="profile-menu__header" mat-menu-item disabled>
    <strong>Igor Bari</strong>
    <small>mucsi96&#64;gmail.com</small>
  </div>
  <mat-divider />
  <button mat-menu-item>
    <mat-icon class="material-symbols-rounded">person</mat-icon>
    <span>Profile</span>
  </button>
  <button mat-menu-item>
    <mat-icon class="material-symbols-rounded">settings</mat-icon>
    <span>Settings</span>
  </button>
  <button mat-menu-item>
    <mat-icon class="material-symbols-rounded">help</mat-icon>
    <span>Help</span>
  </button>
  <mat-divider />
  <button mat-menu-item>
    <mat-icon class="material-symbols-rounded">logout</mat-icon>
    <span>Sign out</span>
  </button>
</mat-menu>
