name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      theme-version: ${{ steps.theme-meta.outputs.version }}
      theme-published: ${{ steps.theme-meta.outputs.published }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build:theme
      # Use the GitHub Pages base href so deep links and asset paths resolve.
      - run: npm run build:gallery
      - name: Inspect theme version
        id: theme-meta
        run: |
          version=$(node -p "require('./projects/theme/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if npm view "@mucsi96/angular-material-theme@$version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload gallery artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/gallery/browser
      - name: Upload theme artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: theme-package
          path: dist/theme

  deploy-gallery:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  publish-npm:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.theme-published == 'false'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          name: theme-package
          path: dist/theme
      - name: Publish
        working-directory: dist/theme
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
